<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Contact Us</h1>
    <a href="index.html">Home</a> |
    <a href="contact.html">Contact</a>
    <hr>
    <h2>Contact Information</h2>
    <table border="1" cellpadding="5" cellspacing="0">
        <tr>
            <th>Department</th>
            <th>Email</th>
            <th>Phone</th>
        </tr>

        <tr>
            <td>Support</td>
            <td>support@example.com</td>
            <td>123-456-7890</td>
        </tr>

        <tr>
            <td>Sales</td>
            <td>sales@example.com</td>
            <td>987-654-3210</td>
        </tr>

        <tr>
            <td>General Inquiry</td>
            <td>info@example.com</td>
            <td>555-555-5555</td>
        </tr>
    </table>

    <hr>

    <h2><i>Please fill out the form below.</i></h2>

    <form>

        <p>
            <label><b>Name:</b></label>
            <input type="text" name="name">
        </p>

        <p>
            <label><b>Email:</b></label>
            <input type="email" name="email">
        </p>

        <p>
            <label><b>Phone:</b></label>
            <input type="tel" name="phone">
        </p>

        <p>
            <label><b>Message:</b></label><br><br>
            <textarea rows="5" cols="40"></textarea>
        </p>

        <p>
            <b>Favorite Topic:</b>
            <input type="radio" name="" value="">HTML
            <input type="radio" name="" value="">CSS
            <input type="radio"name="" value="">Java Script
        </p>

        <hr>

        <input type="submit" value="Send">
        <input type="reset" value="Clear">

    </form>
</body>
</html>
